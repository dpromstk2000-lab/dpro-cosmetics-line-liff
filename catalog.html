<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#6e3c55">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://static.line-scdn.net; connect-src 'self' https://dpro-cosmetics-line-api.dpromstk2000.workers.dev https://api.line.me; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; base-uri 'self'; form-action 'self'">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="cosmetics-next.css">
<script defer src="config.js"></script>
<script defer src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script defer src="common.js"></script>
<meta name="description" content="写真・ブランド・カテゴリ・肌悩みから化粧品を探せます。">
<title>DPROコスメティックサロン｜写真付き商品カタログ</title>
<script defer src="catalog.js"></script>
</head>
<body class="cos-next">
<div class="cos-shell">
<header class="cos-topbar">
  <a class="cos-brand" href="index.html" data-home-link>
    <span class="cos-brand-mark" aria-hidden="true">D</span>
    <span class="cos-brand-copy"><strong>DPROコスメティックサロン</strong><span>Beauty care with LINE</span></span>
  </a>
  <span id="demoBadge" class="cos-demo" hidden>デモ環境</span>
</header>
<main class="cos-main">
  <section class="cos-hero"><p class="cos-eyebrow">PRODUCT CATALOG</p><h1>あなたに合う化粧品を、<br>写真から見つける。</h1><p>ブランド・カテゴリ・肌悩み・使用感から商品を探し、特徴、使い方、在庫状況まで確認できます。</p></section>
  <form id="catalogForm" class="cos-toolbar" role="search">
    <div class="cos-field search-wide"><label for="catalogQuery">商品・ブランドを検索</label><input id="catalogQuery" type="search" maxlength="120" placeholder="例：保湿、リップ、ブランド名"></div>
    <div class="cos-field"><label for="categoryFilter">カテゴリ</label><select id="categoryFilter"><option value="">すべて</option></select></div>
    <div class="cos-field"><label for="brandFilter">ブランド</label><select id="brandFilter"><option value="">すべて</option></select></div>
    <button class="cos-btn primary" type="submit">検索する</button>
  </form>
  <div class="cos-section-head"><div><p class="cos-eyebrow">ITEMS</p><h2>商品一覧</h2></div><p id="catalogCount">読み込み中</p></div>
  <div id="catalogLoading" class="cos-loading"><div class="cos-loading-spinner"></div><strong>商品を読み込んでいます</strong></div>
  <div id="catalogError" class="cos-error" hidden></div>
  <div id="productGrid" class="cos-product-grid" hidden></div>
  <div id="catalogEmpty" class="cos-empty" hidden><strong>条件に合う商品がありません</strong><p>検索条件を変更して、もう一度お試しください。</p></div>
</main>
<footer class="cos-footer">DPROコスメティックサロン｜LINE会員システム</footer><div id="toast" class="toast" role="status" aria-live="polite"></div>
</div>
</body>
</html>
