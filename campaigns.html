<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#3f2734">
  <meta name="description" content="DPRO化粧品店 新商品・キャンペーン">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src 'self' https://dpro-cosmetics-line-api.dpromstk2000.workers.dev; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; base-uri 'self'; form-action 'self'">
  <title>DPROコスメティックサロン｜新商品・キャンペーン</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="config.js"></script>
  <script defer src="common.js"></script>
  <script defer src="campaigns.js"></script>
</head>
<body>
  <div class="site-shell campaigns-page">
    <header class="topbar">
      <div class="brand"><div class="brand-mark">D</div><div class="brand-copy"><span class="brand-title" data-store-name>DPROコスメティックサロン</span><span class="brand-subtitle">新商品・キャンペーン</span></div></div>
      <span id="demoBadge" class="demo-badge" hidden></span>
    </header>
    <main class="page-shell">
      <div class="campaign-hero">
        <div><p class="eyebrow">NEWS & CAMPAIGNS</p><h1>店舗からのお知らせ</h1><p>公開中の新商品情報、季節のお手入れ、キャンペーンをご案内します。</p></div>
        <div class="campaign-hero-icon">✨</div>
      </div>
      <div class="page-actions"><a class="btn secondary" href="index.html?demo=1" data-top-link>トップへ戻る</a></div>
      <div id="campaignsLoading" class="card loading-card"><div class="spinner"></div><p>お知らせを読み込んでいます</p></div>
      <div id="campaignsError" class="alert danger" hidden></div>
      <section id="campaignsList" class="public-campaign-grid"></section>
      <section class="card campaign-consent-note">
        <h2>LINEでのご案内について</h2>
        <p>キャンペーン画面はどなたでも確認できます。LINEへの個別のマーケティング案内は、会員登録時に「新商品・キャンペーンの案内を受け取る」へ同意されたお客様だけが対象です。</p>
      </section>
    </main>
    <footer class="footer"><span data-store-name>DPROコスメティックサロン</span>｜新商品・キャンペーン</footer>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
